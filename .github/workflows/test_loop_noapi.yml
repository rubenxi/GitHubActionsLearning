name: test_loop_noapi

on:
  workflow_dispatch:
    inputs:
      counter:
        required: true
        default: "4"

  workflow_call:
    inputs:
      counter:
        required: true
        type: number 

jobs:
  loop_job:
    runs-on: ubuntu-latest

    steps:
      - name: Show counter
        run: |
          CURRENT=${{ inputs.counter || github.event.inputs.counter }}
          echo "Counter is $CURRENT"

      - name: Calculate next
        id: calc
        run: |
          CURRENT=${{ inputs.counter || github.event.inputs.counter }}
          NEXT=$((CURRENT - 1))
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: End of loop
        if: ${{ steps.calc.outputs.next == 0 }}
        run: echo "end of loop"

  recurse:
    needs: loop_job
    if: ${{ steps.calc.outputs.next > 0 }}
    uses: ./.github/workflows/test_loop_noapi.yml
    with:
      counter: ${{ steps.calc.outputs.next }}
