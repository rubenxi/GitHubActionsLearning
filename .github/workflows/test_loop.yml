permissions:
  actions: write
  contents: read

name: test_loop

on:
  workflow_dispatch:
    inputs:
      counter:
        description: "counter n"
        required: true
        default: "4"

jobs:
  loop:
    runs-on: ubuntu-latest

    steps:
      - name: Show current counter
        run: echo "Current counter is ${{ github.event.inputs.counter }}"

      - name: Calculate next value
        id: calc
        run: |
          NEXT=$((${{ github.event.inputs.counter }} - 1))
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Call itself if counter > 0
        if: ${{ steps.calc.outputs.next > 0 }}
        run: |
          echo "Triggering next run with counter=${{ steps.calc.outputs.next }}"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}.yml/dispatches \
            -d '{
              "ref": "${{ github.ref_name }}",
              "inputs": {
                "counter": "${{ steps.calc.outputs.next }}"
              }
            }'
